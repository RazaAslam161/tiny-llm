<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tiny-llm</title>
<style>
  :root {
    --paper: #f3efe4; --card: #fbf8f0; --ink: #26221b; --muted: #726a5b;
    --line: #d9d1bf; --accent: #9a3b2c;
    --serif: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: var(--sans); font-size: 15px; line-height: 1.5;
    display: flex; justify-content: center; padding: 40px 16px;
  }
  main { width: 100%; max-width: 60ch; }
  h1 { font-family: var(--serif); font-weight: 600; font-size: 30px; margin: 0; letter-spacing: -0.01em; }
  .sub { color: var(--muted); margin: 6px 0 28px; }
  .out {
    background: var(--card); border: 1px solid var(--line);
    padding: 26px 28px; min-height: 240px;
    font-family: var(--serif); font-size: 17px; line-height: 1.72;
    white-space: pre-wrap; word-break: break-word; margin-bottom: 20px;
  }
  .out .prompt { color: var(--accent); }
  .out.empty { color: var(--muted); font-style: italic; }
  .out.empty::before { content: "Your story shows up here."; }
  .cursor { display: inline-block; width: 2px; height: 18px; background: var(--accent);
    vertical-align: text-bottom; animation: blink 1.1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  textarea {
    width: 100%; background: var(--card); color: var(--ink); border: 1px solid var(--line);
    padding: 11px 13px; font: 15px var(--sans); resize: vertical; min-height: 58px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 4px; }
  .chip { border: 1px solid var(--line); background: none; color: var(--muted);
    padding: 5px 11px; font-size: 13px; cursor: pointer; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .hint { color: var(--muted); font-size: 13px; margin: 4px 0 0; }
  .controls { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; margin: 16px 0; }
  .ctl { display: flex; flex-direction: column; gap: 3px; font-size: 12px; color: var(--muted); }
  .ctl input[type=range] { width: 128px; accent-color: var(--accent); }
  .ctl .val { color: var(--ink); font-variant-numeric: tabular-nums; }
  button {
    background: var(--accent); color: var(--paper); border: 0;
    padding: 10px 24px; font: 500 15px var(--sans); cursor: pointer; margin-left: auto;
  }
  button:disabled { background: var(--muted); cursor: default; }
</style>
</head>
<body>
<main>
  <h1>tiny-llm</h1>
  <p class="sub">A small model that writes children's stories. Give it a start and it keeps going.</p>

  <div id="out" class="out empty"></div>

  <textarea id="prompt" rows="2">Once upon a time</textarea>
  <div class="chips" id="chips"></div>
  <p class="hint">Each run samples a new story. Turn temperature up for more variety.</p>
  <div class="controls">
    <label class="ctl">temperature <span class="val" id="tv">0.9</span>
      <input type="range" id="temp" min="0" max="1.5" step="0.05" value="0.9"></label>
    <label class="ctl">top-p <span class="val" id="pv">0.9</span>
      <input type="range" id="topp" min="0.1" max="1" step="0.05" value="0.9"></label>
    <label class="ctl">length <span class="val" id="mv">200</span>
      <input type="range" id="maxt" min="16" max="256" step="8" value="200"></label>
    <button id="go">Write</button>
  </div>
</main>

<script>
  const $ = id => document.getElementById(id);
  const out = $("out"), btn = $("go");
  const bind = (r, v) => { const f = () => $(v).textContent = $(r).value; $(r).oninput = f; f(); };
  bind("temp", "tv"); bind("topp", "pv"); bind("maxt", "mv");

  const EXAMPLES = [
    "Once upon a time",
    "One day, a little girl named Lily",
    "The dog saw a bone and",
    "Tom opened the box and",
    "In the dark forest,",
    "The little robot beeped and",
  ];
  const chips = $("chips");
  for (const ex of EXAMPLES) {
    const c = document.createElement("button");
    c.className = "chip"; c.type = "button"; c.textContent = ex;
    c.onclick = () => { $("prompt").value = ex; generate(); };
    chips.appendChild(c);
  }

  async function generate() {
    const prompt = $("prompt").value;
    btn.disabled = true;
    out.classList.remove("empty");
    out.innerHTML = '<span class="prompt"></span><span class="cursor"></span>';
    out.querySelector(".prompt").textContent = prompt;
    const cursor = out.querySelector(".cursor");

    try {
      const resp = await fetch("/generate", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          prompt,
          max_tokens: +$("maxt").value,
          temperature: +$("temp").value,
          top_p: +$("topp").value,
        }),
      });
      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const events = buf.split("\n\n");
        buf = events.pop();
        for (const ev of events) {
          const line = ev.replace(/^data: /, "");
          if (line === "[DONE]") continue;
          const msg = JSON.parse(line);
          if (msg.token) cursor.insertAdjacentText("beforebegin", msg.token);
        }
      }
    } catch (e) {
      out.insertAdjacentText("beforeend", "\n\n[error: " + e.message + "]");
    } finally {
      cursor.remove();
      btn.disabled = false;
    }
  }

  btn.onclick = generate;
  $("prompt").addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) generate();
  });
</script>
</body>
</html>
